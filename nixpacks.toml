[phases.setup]
nixPkgs = ["python312", "nodejs_20", "ffmpeg"]

[phases.install]
cmds = [
  "pip install -r backend/requirements.txt",
  "cd frontend && npm ci && npm run build"
]

[start]
cmd = "cd backend && alembic upgrade head && python scripts/seed.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
