[phases.setup]
nixPkgs = ["python312", "nodejs_20", "ffmpeg"]

[phases.install]
cmds = [
  "python3.12 -m pip install -r backend/requirements.txt",
  "cd frontend && npm ci && npm run build"
]

[start]
cmd = "cd backend && python3.12 -m alembic upgrade head && python3.12 scripts/seed.py && python3.12 -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
