name: Nila Arumbu CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    name: Backend — Lint · Type · Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: nila
          POSTGRES_PASSWORD: password
          POSTGRES_DB: nilarumbu_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (Ruff)
        run: |
          pip install ruff
          ruff check app/ tests/

      - name: Type check (MyPy)
        run: |
          pip install mypy
          mypy app/ --ignore-missing-imports --no-strict-optional

      - name: Run tests with coverage
        env:
          POSTGRES_SERVER: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_USER: nila
          POSTGRES_PASSWORD: password
          POSTGRES_DB: nilarumbu_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key-not-for-production
          ENVIRONMENT: test
        run: |
          pip install pytest-cov
          python -m pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=70

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Lint · Type · Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ── Docker build check ────────────────────────────────────────────────────────
  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t nilarumbu-backend:ci ./backend

      - name: Verify image starts
        run: |
          docker run --rm -d \
            -e SECRET_KEY=ci-test \
            -e POSTGRES_SERVER=localhost \
            -e POSTGRES_USER=nila \
            -e POSTGRES_PASSWORD=password \
            -e POSTGRES_DB=nilarumbu \
            --name test-backend \
            nilarumbu-backend:ci \
            uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 3
          docker stop test-backend || true
